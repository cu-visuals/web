<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immobilien • CU VISUALS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#000;color:#fff;font-family:'Inter'}
.neon{color:#00f3ff}

/* 🎬 VIDEO SYSTEM */
.video-container{
  position:relative;
  height:500px;
  overflow:hidden;
}

.video-main{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:100%;
  z-index:2;
}

.video-blur{
  position:absolute;
  inset:0;
  filter:blur(60px);
  opacity:0.4;
  transform:scale(1.3);
}

.video-mirror-left,
.video-mirror-right{
  position:absolute;
  top:0;
  height:100%;
  width:50%;
  object-fit:cover;
  opacity:0.25;
  filter:blur(30px);
}

.video-mirror-left{
  left:0;
  transform:scaleX(-1);
}

.video-mirror-right{
  right:0;
}

/* Galerie */
.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:16px;
  transition:.4s;
}

.gallery img:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #00f3ff;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="p-6 flex justify-between border-b border-white/10">
<a href="index.html" class="neon font-bold">CU</a>
<a href="index.html">← Zurück</a>
</nav>

<!-- HERO -->
<section class="video-container">

<!-- BLUR -->
<video autoplay muted loop class="video-blur">
<source src="Immobilie.mp4">
</video>

<!-- SPIEGEL LINKS -->
<video autoplay muted loop class="video-mirror-left">
<source src="Immobilie.mp4">
</video>

<!-- SPIEGEL RECHTS -->
<video autoplay muted loop class="video-mirror-right">
<source src="Immobilie.mp4">
</video>

<!-- MAIN VIDEO -->
<video autoplay muted loop class="video-main">
<source src="Immobilie.mp4">
</video>

</section>

<!-- CONTENT -->
<section class="text-center py-20">
<h1 class="text-5xl neon font-bold">Immobilien</h1>
<p class="text-gray-400 mt-4">Verkaufsstarker Content für Immobilien.</p>
</section>

</body>
</html>
