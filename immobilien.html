<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immobilien • CU VISUALS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#000;color:#fff;font-family:'Inter'}
.neon{color:#00f3ff}

.video-wrap{position:absolute;inset:0;display:flex;justify-content:center;align-items:center}
.video-blur{position:absolute;width:200%;height:200%;object-fit:cover;filter:blur(60px) brightness(1.2);opacity:.4}
.video-main{height:100%;max-height:600px;object-fit:contain;opacity:.7}

.fade-up{opacity:0;transform:translateY(60px);transition:1s}
.fade-up.visible{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<nav class="p-6 flex justify-between border-b border-white/10">
<a href="index.html" class="neon">CU</a>
<a href="index.html">← Zurück</a>
</nav>

<section class="relative py-32 overflow-hidden">

<div class="video-wrap">
<video autoplay muted loop class="video-blur"><source src="Immobilie.mp4"></video>
<video autoplay muted loop class="video-main"><source src="Immobilie.mp4"></video>
</div>

<div class="relative z-10 text-center max-w-3xl mx-auto px-6">
<h1 class="text-6xl neon fade-up">Deine Immobilie verdient Aufmerksamkeit</h1>

<p class="fade-up mt-6 text-gray-300 text-lg">
Hochwertiger Content sorgt für mehr Anfragen, bessere Käufer und schnellere Abschlüsse.
</p>

<a href="index.html#kontakt" class="fade-up mt-10 inline-block bg-[#00f3ff] text-black px-8 py-4 rounded-xl font-semibold">
Jetzt verkaufen optimieren
</a>
</div>

</section>

<footer class="py-16 text-center border-t border-white/10">
<button onclick="toggleImpressum()">Impressum</button>
<div id="impressum" class="hidden mt-6 text-gray-400 text-sm">
Cedric Unger • Kontakt siehe Hauptseite
</div>
</footer>

<script>
const obs=new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('visible')));
document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
function toggleImpressum(){impressum.classList.toggle('hidden')}
</script>

</body>
</html>
