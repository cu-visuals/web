<!DOCTYPE html>
<html lang="de">
<head>

<title>Immobilien • CU VISUALS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

body{background:#000;color:#fff;font-family:'Inter'}
.logo-font{font-family:'Space Grotesk'}

.video-wrap{position:absolute;inset:0;display:flex;justify-content:center;align-items:center}

.video-main{height:100%;max-height:500px;object-fit:contain;opacity:.7}

<body>

<nav class="p-6 flex justify-between border-b border-white/10">

</nav>

<section class="relative py-32 overflow-hidden">

<div class="video-wrap">
<video autoplay muted loop class="video-blur"><source src="Immobilie.mp4"></video>
<video autoplay muted loop class="video-main"><source src="Immobilie.mp4"></video>
</div>

<div class="relative z-10 text-center max-w-3xl mx-auto px-6 mt-24 md:mt-40">

<h1 class="logo-font text-6xl neon">
Immobilien verkaufen sich über Emotionen
</h1>

<p class="mt-6 text-gray-300">

</p>

<a href="index.html#kontakt"
class="mt-10 inline-block bg-[#00f3ff] text-black px-10 py-4 rounded-xl font-semibold">
Mehr Anfragen erhalten
</a>

</div>
</section>

<h2 class="logo-font text-3xl neon mb-6">

</p>
