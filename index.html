<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CU VISUALS • Cedric Unger</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap');

    :root { --neon:#00f3ff; }

    body {
      font-family: 'Inter', sans-serif;
      background:#0a0a0a;
      color:#e5e5e5;
    }

    .luxury-font { font-family: 'Playfair Display', serif; }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
      url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
    }

    .neon {
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon);
    }

    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-black/70 backdrop-blur-xl border-b border-white/10 py-6">
  <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">

    <div class="text-lg tracking-[4px] luxury-font neon">CU VISUALS</div>

    <div class="hidden md:flex gap-12 text-xs uppercase tracking-[3px] text-gray-400">
      <a href="#leistungen" class="hover:text-white">Leistungen</a>
      <a href="#referenzen" class="hover:text-white">Work</a>
      <a href="#story" class="hover:text-white">Story</a>
    </div>

    <a onclick="openBookingModal()" class="border border-[#00f3ff] text-[#00f3ff] px-8 py-3 text-xs tracking-[2px] hover:bg-[#00f3ff] hover:text-black transition cursor-pointer">
      BOOK NOW
    </a>

  </div>
</nav>

<!-- HERO -->
<header class="hero min-h-screen flex items-center justify-center text-center">
  <div>
    <h1 class="luxury-font text-5xl md:text-7xl tracking-[6px] mb-6 neon">CU VISUALS</h1>
    <p class="text-gray-400 tracking-[3px] text-sm">CINEMATIC STORYTELLING</p>
  </div>
</header>

<!-- PORTFOLIO -->
<section id="referenzen" class="py-32">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="luxury-font text-3xl mb-16 tracking-[4px] neon">SELECTED WORK</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <img src="Schlatt-6.jpg" class="hover:opacity-70 transition">
      <img src="Schlatt-5.jpg" class="hover:opacity-70 transition">
      <img src="DSCF6793.jpg" class="hover:opacity-70 transition">
    </div>
  </div>
</section>

<!-- SERVICES -->
<section id="leistungen" class="py-32 border-t border-white/10">
  <div class="max-w-5xl mx-auto text-center">
    <h2 class="luxury-font text-3xl mb-16 tracking-[4px] neon">SERVICES</h2>

    <div class="grid md:grid-cols-3 gap-10 text-sm tracking-[2px] text-gray-400">
      <div>PHOTOGRAPHY</div>
      <div>VIDEOGRAPHY</div>
      <div>CONTENT CREATION</div>
    </div>
  </div>
</section>

<!-- STORY -->
<section id="story" class="py-32 border-t border-white/10 text-center">
  <div class="max-w-2xl mx-auto">
    <h2 class="luxury-font text-3xl mb-10 tracking-[4px] neon">THE STORY</h2>
    <p class="text-gray-400 leading-relaxed">
      Since 2022 capturing moments in a cinematic way.
      Every project is treated like a film.
    </p>
  </div>
</section>

<!-- FOOTER -->
<footer class="py-12 text-center text-gray-500 text-xs tracking-[2px]">
  © 2026 CU VISUALS
</footer>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
  <div class="glass p-10 max-w-md w-full">
    <h3 class="luxury-font text-xl mb-6 tracking-[3px] neon">BOOKING</h3>
    <input placeholder="NAME" class="w-full mb-4 bg-transparent border-b border-white/20 p-2">
    <input placeholder="EMAIL" class="w-full mb-4 bg-transparent border-b border-white/20 p-2">
    <button class="mt-6 border border-[#00f3ff] text-[#00f3ff] px-6 py-2 w-full hover:bg-[#00f3ff] hover:text-black transition">SEND</button>
  </div>
</div>

<script>
function openBookingModal(){
  document.getElementById('modal').classList.remove('hidden');
}
</script>

</body>
</html>
