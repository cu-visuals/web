<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CU VISUALS • Cedric Unger</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

:root { --neon: #00f3ff; }

body {
  font-family: 'Inter', sans-serif;
  background:#ffffff;
  color:#111827;
  scroll-behavior:smooth;
}

.logo-font { font-family: 'Space Grotesk', sans-serif; }

.cu-logo {
  font-size: clamp(120px, 18vw, 240px);
  font-weight: 900;
  letter-spacing: -12px;
  background: linear-gradient(90deg, #00b8d4, #0284c8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 15px #00a8c2;
}

.hero-bg {
  background: linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.9)),
              url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat fixed;
}

/* SERVICE CARDS */
.service-card{
  transition:0.3s;
  cursor:pointer;
}
.service-card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  border-color:#00f3ff;
}

.img-wrap { position:relative; overflow:hidden; border-radius:20px; cursor:pointer; }
.img-wrap img { width:100%; height:100%; object-fit:cover; transition:0.7s ease; }
.img-wrap:hover img { transform:scale(1.1); filter:brightness(0.8); }

.fade-up { opacity:0; transform:translateY(40px); transition:1s; }
.fade-up.visible { opacity:1; transform:translateY(0); }

.parallax { transform: translateY(0); transition: transform 0.2s linear; }

#lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:9999; }
#lightbox img { max-width:90%; max-height:90%; }

</style>
</head>

<body id="top">

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b py-4">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">

    <a href="index.html" class="flex items-center">
      <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-xl flex items-center justify-center text-xl font-black logo-font">CU</div>
    </a>

    <div class="hidden lg:flex gap-8 text-sm uppercase tracking-widest">
      <a href="#leistungen">Leistungen</a>
      <a href="#referenzen">Referenzen</a>
      <a href="#kontakt">Kontakt</a>
    </div>

    <div class="flex items-center gap-4">
      <a href="#kontakt" class="hidden sm:block bg-[#00f3ff] text-white px-6 py-2 rounded-xl font-semibold text-sm">Buchen</a>
      <div id="hamburger" class="text-3xl cursor-pointer">☰</div>
    </div>

  </div>
</nav>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="hidden fixed inset-0 bg-white z-[999] flex flex-col items-center justify-center gap-8 text-2xl">
  <a href="index.html">Startseite</a>
  <a href="hochzeiten.html">Hochzeiten</a>
  <a href="immobilien.html">Immobilien</a>
  <a href="content.html">Social Media</a>
  <a href="shooting.html">Shootings</a>
  <button onclick="toggleMenu()">Schließen ✕</button>
</div>

<!-- HERO -->
<header class="hero-bg min-h-screen flex items-center justify-center text-center">
  <div>
    <h1 class="cu-logo logo-font">CU</h1>
    <div class="text-6xl md:text-8xl font-bold tracking-widest text-black -mt-8">VISUALS</div>
    <p class="mt-10 text-2xl text-gray-700">Foto- & Videograf</p>
  </div>
</header>

<!-- LEISTUNGEN -->
<section id="leistungen" class="py-28">
  <h2 class="text-center font-bold mb-16 text-3xl">Leistungen</h2>

  <div class="grid md:grid-cols-4 gap-6 max-w-6xl mx-auto px-6">

    <a href="hochzeiten.html" class="service-card p-8 border rounded-xl text-center">💒 Hochzeiten</a>

    <a href="immobilien.html" class="service-card p-8 border rounded-xl text-center">🏠 Immobilien</a>

    <a href="content.html" class="service-card p-8 border rounded-xl text-center">📱 Social Media</a>

    <a href="shooting.html" class="service-card p-8 border rounded-xl text-center">📸 Shootings</a>

  </div>
</section>

<!-- FOOTER -->
<footer class="py-12 text-center text-sm text-gray-500">
  © 2026 CU VISUALS
</footer>

<script>

const burger=document.getElementById('hamburger');
const menu=document.getElementById('mobileMenu');

burger.addEventListener('click',()=>{
  menu.classList.toggle('hidden');
});

function toggleMenu(){
  menu.classList.toggle('hidden');
}

</script>

</body>
</html>
