<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CU VISUALS • Cedric Unger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');
    
    :root { --neon: #00f3ff; }
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: #ffffff; 
      color: #111827; 
      scroll-behavior: smooth; 
    }
    .logo-font { font-family: 'Space Grotesk', sans-serif; }
    .neon-text { 
      text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon), 0 0 80px var(--neon); 
    }
    
    .hero-bg { 
      background: linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.9)), 
                  url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat fixed; 
    }
    
    .glass { 
      background: rgba(255,255,255,0.95); 
      backdrop-filter: blur(20px); 
      border: 1px solid rgba(0,0,0,0.08); 
    }
  </style>
</head>
<body>

  <!-- NAV (unverändert) -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b py-5">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <a href="#" class="flex items-center gap-3">
        <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-3xl font-black logo-font neon-text">CU</div>
        <span class="text-2xl font-bold tracking-tighter logo-font text-[#00f3ff]">CU VISUALS</span>
      </a>

      <div class="hidden md:flex gap-10 text-sm font-medium uppercase tracking-widest">
        <a href="#leistungen" class="hover:text-[#00f3ff]">Leistungen</a>
        <a href="#referenzen" class="hover:text-[#00f3ff]">Referenzen</a>
        <a href="#preise" class="hover:text-[#00f3ff]">Preise</a>
        <a href="#story" class="hover:text-[#00f3ff]">Die Story</a>
      </div>

      <a href="#" onclick="openBookingModal()" class="bg-[#00f3ff] text-white px-10 py-4 rounded-2xl font-semibold hover:bg-black hover:text-white transition-all">JETZT BUCHEN</a>

      <button id="hamburger" class="md:hidden text-4xl transition-all">☰</button>
    </div>
  </nav>

  <!-- HERO – CU jetzt klar vorne und prominent -->
  <header class="hero-bg min-h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <div class="relative mb-6">
        <!-- CU Logo groß und mit Neon -->
        <h1 class="logo-font text-[180px] md:text-[240px] font-black tracking-[-20px] leading-none text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 neon-text">
          CU
        </h1>
        <!-- VISUALS direkt darunter -->
        <div class="text-6xl md:text-8xl font-bold tracking-widest text-black -mt-8">VISUALS</div>
      </div>

      <p class="text-4xl font-light">Cedric Unger</p>
      <p class="text-2xl text-gray-700 mt-2">Foto- &amp; Videograf</p>
      <p class="mt-10 max-w-md mx-auto text-2xl font-light">where moments become cinematic</p>

      <div class="mt-20 flex flex-col sm:flex-row gap-6 justify-center">
        <a href="#" onclick="openBookingModal()" class="bg-[#00f3ff] text-white px-14 py-6 rounded-3xl text-xl font-semibold">TERMIN BUCHEN</a>
        <a href="#referenzen" class="border-2 border-cyan-400 px-14 py-6 rounded-3xl text-xl hover:bg-cyan-400 hover:text-white">Referenzen</a>
      </div>
    </div>
  </header>

  <!-- PREISE (Express entfernt, wie gewünscht) + alle anderen Abschnitte -->
  <!-- (Der Rest ist identisch mit der letzten Version – nur der Hero ist jetzt fixiert) -->

  <!-- ... (Leistungen, Referenzen, Preise, Story, Footer, Modal) ... -->

  <!-- BUCHUNGS MODAL + SCRIPT (unverändert) -->
  <!-- (Ich habe sie hier aus Platzgründen weggelassen – sie sind genau wie in der vorherigen Nachricht) -->

  <script>
    // Hamburger, Modal und E-Mail-Funktion bleiben gleich
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    });

    function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('hidden'); }
    function openBookingModal() { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function sendEmail() {
      const name = document.getElementById('name').value || 'Unbekannt';
      const subject = `Buchungsanfrage - ${document.getElementById('package').value} - ${name}`;
      const body = `Name: ${name}%0D%0AEmail: ${document.getElementById('email').value}%0D%0ANachricht: ${document.getElementById('message').value}`;
      window.location.href = `mailto:cu.visuals@web.de?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      closeModal();
    }
  </script>
</body>
</html>
