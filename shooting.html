<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media • CU VISUALS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#000;color:#fff;font-family:'Inter'}
.neon{color:#00f3ff}

.video-container{
  position:relative;
  height:500px;
  overflow:hidden;
}

.video-main{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  height:100%;
  z-index:2;
}

.video-blur{
  position:absolute;
  inset:0;
  filter:blur(60px);
  opacity:0.4;
  transform:scale(1.3);
}

.video-mirror-left,
.video-mirror-right{
  position:absolute;
  top:0;
  height:100%;
  width:50%;
  object-fit:cover;
  opacity:0.25;
  filter:blur(30px);
}

.video-mirror-left{
  left:0;
  transform:scaleX(-1);
}

.video-mirror-right{
  right:0;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:16px;
}
</style>
</head>

<body>

<nav class="p-6 flex justify-between border-b border-white/10">
<a href="index.html" class="neon font-bold">CU</a>
<a href="index.html">← Zurück</a>
</nav>

<section class="video-container">

<video autoplay muted loop class="video-blur">
<source src="Content.mp4">
</video>

<video autoplay muted loop class="video-mirror-left">
<source src="Content.mp4">
</video>

<video autoplay muted loop class="video-mirror-right">
<source src="Content.mp4">
</video>

<video autoplay muted loop class="video-main">
<source src="Content.mp4">
</video>

</section>

<section class="text-center py-20">
<h1 class="text-5xl neon font-bold">Social Media</h1>
<p class="text-gray-400 mt-4">Content der Reichweite bringt.</p>
</section>

</body>
</html>
