<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hochzeiten • CU VISUALS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background:#000;
  color:#fff;
  font-family: Inter, sans-serif;
}

.neon { color:#00f3ff; }

.gallery img {
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:16px;
  transition:0.4s;
}

.gallery img:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #00f3ff;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="p-6 flex justify-between items-center border-b border-white/10">
  <a href="index.html" class="neon text-xl font-bold">CU</a>
  <a href="index.html" class="text-gray-400">← Zurück</a>
</nav>

<!-- HERO VIDEO -->
<section class="relative h-[80vh] overflow-hidden">
  <video src="hochzeit.mp4" autoplay muted loop class="w-full h-full object-cover"></video>

  <div class="absolute inset-0 bg-black/60 flex items-center justify-center text-center">
    <div>
      <h1 class="text-5xl font-bold neon">Hochzeiten</h1>
      <p class="mt-4 text-gray-300">Emotionale Erinnerungen für die Ewigkeit</p>
    </div>
  </div>
</section>

<!-- TEXT -->
<section class="py-20 text-center max-w-3xl mx-auto px-6">
  <h2 class="text-3xl font-bold neon mb-6">Euer Tag verdient mehr als Standard</h2>
  <p class="text-gray-400">
    Ich begleite euch diskret und halte echte Momente fest – keine gestellten Szenen, sondern echte Emotionen.
  </p>
</section>

<!-- GALERIE -->
<section class="py-20 max-w-6xl mx-auto px-6">
  <h2 class="text-3xl font-bold neon mb-10 text-center">Einblicke</h2>

  <div class="grid md:grid-cols-3 gap-6 gallery">
    <img src="hochzeit1.jpg">
    <img src="hochzeit2.jpg">
    <img src="hochzeit3.jpg">
    <img src="hochzeit4.jpg">
    <img src="hochzeit5.jpg">
    <img src="hochzeit6.jpg">
  </div>
</section>

<!-- CTA -->
<section class="text-center py-20">
  <a href="index.html#kontakt" class="bg-[#00f3ff] text-black px-10 py-5 rounded-xl font-semibold">
    Jetzt anfragen
  </a>
</section>

</body>
</html>
